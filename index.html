<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>

<body>
    <video autoplay loop muted class="video-background">
        <source src="assets/video/background-pokemon.mp4" />
    </video>

    <div class="container">
        <div class="content">
            <h1>Pokedex</h1>
            <div id="search-pokemon">
                <label for="pokemons">Choose Pokemon </label>
                <select id="pokemons">
                    <option value="">Select a Pokemon</option>
                </select>
            </div>

            <div id="pokemon-info" class="card-info">
                
            </div>
        </div>
    </div>
</body>

</html>
